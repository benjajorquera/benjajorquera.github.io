<html>

{% include head.html %}

<body>

    {% include header.html %}

    <section id="banner" class="{{ page.style }}">
        <div class="inner">
            <span class="image">
                <img src="{{ site.baseurl }}/{{ page.image }}" alt="">
            </span>
            <header class="major">

                <h1>{{ page.title }}</h1>

            </header>
            <div class="content">

                {{ page.description }}

            </div>
        </div>
    </section>

    {% if page.about %}
    {% include about.html %}
    {% endif %}

    {{ content }}

    {% if page.grid %}
    <section style="border-bottom: solid 1px rgba(212, 212, 255, .1);">
        {% include grid.html %}
    </section>
    {% endif %}

    {% include footer.html %}

</body>

</html>
