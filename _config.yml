          Anteriormente estuve en el Colegio Cristobal Colón de Melipilla.
      - layout: left
        border: weak
        title: <img src = "images/Logo_UTFSM.png" alt = "UTFSM logo" height = 100px width = auto><br>Universidad Técnica Federico Santa María
        caption: 2014 - 2019
        sub_title: Ingeniería Civil Informática
        quote: >
          La Universidad Técnica Federico Santa María es una universidad tradicional privada chilena, perteneciente al Consejo de Rectores de las Universidades Chilenas, a la Agrupación de Universidades Regionales de Chile, a la Red Universitaria Cruz del Sur y a la Red Universitaria G9.
        description: | # this will include new lines to allow paragraphs
          Después de cinco años decido retirarme voluntariamente de la institución, a continuación un resumen del Plan de Estudios aprobado:
          - Fundamentos de Informática: Programación, Estructura de Datos, Lenguajes de Programación, Estructuras Discretas, Informática Teórica, y Algoritmos y Complejidad.
          - Matemáticas, Físicas y Química: Cálculo y Álgebra avanzados, Álgebra Lineal, Cálculo Integral y Diferencial, Ecuaciones Diferenciales Ordinarias y Parciales, Lógica, Física Clásica, Termodinámica, Fluidos y Ondas, y Química y Sociedad.
          - Transversal e Integración: Introducción a la Ingeniería e Ingeniería, Informática y Sociedad.
          - Sistemas de Información y de Decisión: Teoría de Sistemas, Organización y Sistemas de Información, Optimización, Investigación de Operaciones, y Sistemas de Gestión.
          - Infraestructura TIC: Arquitectura y Organización de Computadores, Sistemas Operativos, y Redes computacionales.
          - Ingeniería de Software y Datos: Bases de Datos, Análisis y Diseño de Software, Ingeniería de Software, y Diseño Interfaces Usuarias.
          - Industrial y Comercial: Economía, e Información y Matemáticas Financieras.
          - Análisis Numérico: Estadística Computacional.
          - Humanistas, libres y deportes: Inglés 4
      - layout: left
        title: <img src = "images/usach.png" alt = "USACH logo" height = 100px width = auto><br>Universidad de Santiago de Chile
